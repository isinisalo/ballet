name: Release Ballet CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build self-contained archive
        run: scripts/build-release.sh "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}" release
      - uses: actions/upload-artifact@v4
        with:
          name: ballet-darwin-${{ matrix.arch }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Require Homebrew tap token
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to publish a Ballet release." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ballet-darwin-*
          path: release
          merge-multiple: true
      - name: Create checksums and Homebrew formula
        run: |
          cd release
          shasum -a 256 ballet_*.tar.gz > checksums.txt
          cd ..
          scripts/render-homebrew-formula.sh "${GITHUB_REF_NAME#v}" release/checksums.txt release/ballet.rb
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*.tar.gz"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
            release/ballet.rb
            scripts/install.sh
          fail_on_unmatched_files: true
      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: isinisalo/homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Publish Homebrew formula
        run: |
          mkdir -p homebrew-tap/Formula
          cp release/ballet.rb homebrew-tap/Formula/ballet.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ballet.rb
          git diff --cached --quiet || git commit -m "chore: update Ballet to ${GITHUB_REF_NAME}"
          git push
